<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Bảng Điều Khiển - Lịch Sử Hợp Đồng</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Source+Serif+4:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0B1120;
      --ink-2: #1A2744;
      --gold: #C9A661;
      --gold-2: #E8C97A;
      --emerald: #10B981;
      --text: #F1F5F9;
    }
    body {
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, #0B1120 0%, #111827 100%); 
      color: var(--text);
      margin: 0; display: flex; flex-direction: column; min-height: 100vh;
      position: relative;
    }
    body::before {
      content: ''; position: absolute; top: -20%; left: -10%; width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(201, 166, 97, 0.08) 0%, rgba(11, 17, 32, 0) 70%);
      pointer-events: none; z-index: 0;
    }
    .header {
      padding: 24px 40px; 
      background: rgba(26, 39, 68, 0.3);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
    .header h1 { margin: 0; color: var(--gold); font-family: 'Source Serif 4', serif; text-shadow: 0 2px 10px rgba(201,166,97,0.2); }
    .container {
      flex: 1; padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; z-index: 1; position: relative;
    }
    .search-bar { display: flex; gap: 16px; margin-bottom: 40px; }
    .search-bar input {
      flex: 1; padding: 16px 20px; font-size: 16px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color: white;
      transition: all 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
    }
    .search-bar input:focus {
      outline: none; border-color: rgba(201,166,97,0.5); background: rgba(255,255,255,0.06); box-shadow: 0 0 0 4px rgba(201,166,97,0.1);
    }
    .search-bar button {
      padding: 0 32px; background: linear-gradient(135deg, var(--gold), var(--gold-2));
      border: none; border-radius: 12px; color: #111; font-weight: bold; font-size: 16px; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 15px rgba(201,166,97,0.2);
    }
    .search-bar button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,166,97,0.4); }
    #contracts-table { 
      width: 100%; border-collapse: separate; border-spacing: 0; background: rgba(26, 39, 68, 0.4); 
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    #contracts-table th, #contracts-table td { padding: 18px 24px; text-align: left; }
    #contracts-table th { background: rgba(0, 0, 0, 0.2); color: var(--gold); font-weight: 600; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }
    #contracts-table tr td { border-bottom: 1px solid rgba(255,255,255,0.03); transition: all 0.2s; }
    #contracts-table tr:hover td { background: rgba(255,255,255,0.04); }
    #contracts-table td { color: #CBD5E1; font-size: 15px; }
    .btn-view {
      background: rgba(16, 185, 129, 0.1); color: #34D399;
      border: 1px solid rgba(16, 185, 129, 0.3); padding: 8px 18px; border-radius: 8px; cursor: pointer;
      font-weight: 600; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-view:hover { background: var(--emerald); color: white; border-color: var(--emerald); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(16,185,129,0.3); }

    /* Modal Viewer */
    #modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 1000; padding: 20px; box-sizing: border-box;
      flex-direction: column; align-items: center;
    }
    #modal-toolbar {
      width: 100%; max-width: 900px; display: flex; justify-content: space-between; margin-bottom: 16px; padding: 0 10px;
    }
    #modal-toolbar button { padding: 10px 24px; font-weight: bold; cursor: pointer; border-radius: 8px; border: none; transition: all 0.2s; }
    #btn-close-modal { background: rgba(244, 63, 94, 0.15); color: #F43F5E; border: 1px solid rgba(244, 63, 94, 0.3); }
    #btn-close-modal:hover { background: #F43F5E; color: white; transform: scale(1.02); }
    #btn-print-modal { background: linear-gradient(135deg, var(--gold), var(--gold-2)); color: #111; box-shadow: 0 4px 15px rgba(201,166,97,0.3); }
    #btn-print-modal:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(201,166,97,0.5); }
    #modal-content {
      background: #fff; color: #000; width: 100%; max-width: 900px; height: 100%;
      overflow-y: auto; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      border-radius: 12px; box-sizing: border-box;
    }

    /* Auth */
    #auth-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: radial-gradient(circle at center, #1A2744 0%, #0B1120 100%); z-index: 999999;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: rgba(26, 39, 68, 0.4); padding: 40px; border-radius: 20px;
      width: 380px; color: #F1F5F9; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .login-box h2 { margin-top: 0; color: var(--gold); text-align: center; font-family: 'Source Serif 4', serif; font-size: 24px; }
    .login-box input { 
      width: 100%; padding: 14px; margin: 12px 0; border-radius: 8px; box-sizing:border-box; 
      background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color:white; font-size: 15px;
      transition: all 0.3s;
    }
    .login-box input:focus { outline: none; border-color: var(--gold); background: rgba(0,0,0,0.4); }
    .login-box button { 
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), var(--gold-2)); 
      color: #111; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 15px; 
      transition: all 0.3s;
    }
    .login-box button:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(201,166,97,0.3); }
    #login-error { color: #F43F5E; font-size: 14px; text-align: center; margin-top: 15px; display: none; font-weight: 600; }
    #main-app { display: none; }

    /* Modal preview styles */
    #modal-content .page-break {
      border-bottom: 4px dashed #ccc;
      margin-bottom: 60px;
      padding-bottom: 20px;
    }
    .doc-title {
      text-align: center;
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 20px;
    }

    /* =====================================================
       PRINT-ZONE: Copy Y HỆT từ unified_workflow/index.html
       Dòng 286-318 trong file gốc
       ===================================================== */
    #print-zone {
      display: none;
    }

    @media print {
      @page {
        margin-top: 15mm;
        margin-bottom: 10mm;
        margin-left: 10mm;
        margin-right: 10mm;
      }
      
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      
      body {
        display: block !important; 
        background: #fff !important;
        color: #000 !important; /* KHẮC PHỤC LỖI MỜ CHỮ DO THEME TỐI CỦA DASHBOARD */
      }
      
      /* Ẩn toàn bộ body trừ print-zone — GIỐNG HỆT DỰ ÁN GỐC */
      body > :not(#print-zone) {
        display: none !important;
      }

      #print-zone {
        display: block !important;
        position: static !important;
        width: 100% !important;
        color: #000 !important;
      }

      #print-zone,
      #print-zone * {
        visibility: visible;
        color: #000 !important;
      }

      .doc-preview {
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        max-width: none !important;
        font-size: 17px;
        color: #000 !important;
      }

      /* Khắc phục triệt để logo bị cắt mà KHÔNG làm kích thước trang bị phình to:
         Khử toàn bộ lệnh đẩy ngược (top: -20px) của ảnh khi in */
      #print-zone img {
        top: 0 !important;
        margin-top: 0 !important;
      }

      .page-break {
        display: block !important;
        page-break-before: always !important;
        break-before: page !important;
      }
      
      .page-break:first-child {
        page-break-before: auto !important;
        break-before: auto !important;
      }

      .page-break:last-child {
        page-break-after: auto;
      }
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- PRINT ZONE: ẩn bình thường, hiện khi in — GIỐNG HỆT DỰ ÁN GỐC -->
  <div id="print-zone"></div>

  <div id="auth-overlay">
    <div class="login-box">
      <h2>CỔNG BẢO MẬT</h2>
      <input type="email" id="login-email" placeholder="Email nhân viên" />
      <input type="password" id="login-pass" placeholder="Mật khẩu" />
      <button id="btn-login">ĐĂNG NHẬP</button>
      <div id="login-error">...</div>
    </div>
  </div>

  <div id="main-app">
    <div class="header">
      <div style="display: flex; align-items: center; gap: 15px;">
        <a href="index.html" style="background: rgba(201, 166, 97, 0.15); color: var(--gold); border: 1px solid rgba(201, 166, 97, 0.3); padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; transition: 0.2s;">🏠 Trang Chủ</a>
        <h1>KHO LƯU TRỮ</h1>
      </div>
      <button id="btn-logout" style="background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.3); padding:8px 16px; border-radius:6px; cursor:pointer; font-weight: bold; transition: 0.2s;">Đăng xuất</button>
    </div>
    <div class="container">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Tìm kiếm theo mã số hợp đồng, mã báo giá...">
        <button id="btn-search">Tìm Kiếm</button>
      </div>
      <table id="contracts-table">
        <thead>
          <tr><th>Mã Số</th><th>Tên Khách Hàng</th><th>Tổng Tiền</th><th>Ngày Lập</th><th>Thao Tác</th></tr>
        </thead>
        <tbody>
          <tr><td colspan="5" style="text-align:center;">Đang tải dữ liệu...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal xem -->
  <div id="modal-overlay">
    <div id="modal-toolbar">
      <button id="btn-close-modal">✖ Đóng</button>
      <button id="btn-print-modal">⎙ Xuất File PDF / In Ngay</button>
    </div>
    <div id="modal-content"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB3VAwCZbtmpqyNYB9XT2vSDZT4isF0rlc",
      authDomain: "quanlyhopdong-298e9.firebaseapp.com",
      projectId: "quanlyhopdong-298e9",
      storageBucket: "quanlyhopdong-298e9.firebasestorage.app",
      messagingSenderId: "443139409005",
      appId: "1:443139409005:web:4c5f46d8fe852327752b64"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    db.settings({ experimentalForceLongPolling: true });

    const authOverlay = document.getElementById('auth-overlay');
    const mainApp = document.getElementById('main-app');

    auth.onAuthStateChanged(user => {
      if (user) {
        authOverlay.style.display = 'none';
        mainApp.style.display = 'block';
        loadData();
      } else {
        authOverlay.style.display = 'flex';
        mainApp.style.display = 'none';
      }
    });

    document.getElementById('btn-login').addEventListener('click', () => {
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-pass').value;
      auth.signInWithEmailAndPassword(email, pass).catch(err => {
        const errEL = document.getElementById('login-error');
        errEL.style.display = 'block';
        errEL.innerText = err.message;
      });
    });

    document.getElementById('btn-logout').addEventListener('click', () => auth.signOut());

    let allContracts = [];

    function loadData() {
      db.collection('contracts_cloud').orderBy('timestamp', 'desc').limit(200).get().then(snapshot => {
        allContracts = [];
        snapshot.forEach(doc => {
          allContracts.push({ id: doc.id, ...doc.data() });
        });
        renderTable(allContracts);
      });
    }

    function renderTable(data) {
      const tbody = document.querySelector('#contracts-table tbody');
      tbody.innerHTML = '';
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Không tìm thấy kết quả!</td></tr>';
        return;
      }
      data.forEach(item => {
        const tr = document.createElement('tr');
        let dateStr = "N/A";
        if (item.timestamp && item.timestamp.toDate) {
          dateStr = item.timestamp.toDate().toLocaleDateString('vi-VN');
        } else if (item.ngay_ky) {
          dateStr = item.ngay_ky;
        }
        tr.innerHTML = `
          <td style="color:var(--gold); font-weight:bold;">${item.ma_so || '---'}</td>
          <td style="color:#fff;">${item.ten_cong_ty || '---'}</td>
          <td>${item.tong_tien || '0'} đ</td>
          <td>${dateStr}</td>
          <td><button class="btn-view" onclick="viewDoc('${item.id}')">👁 Xem & Lấy PDF</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      const val = e.target.value.toLowerCase().trim();
      const filtered = allContracts.filter(c =>
        (c.ma_so || '').toLowerCase().includes(val) ||
        (c.ten_cong_ty || '').toLowerCase().includes(val) ||
        (c.html_content || '').toLowerCase().includes(val)
      );
      renderTable(filtered);
    });

    // ========== Modal ==========
    const modal = document.getElementById('modal-overlay');
    const modalContent = document.getElementById('modal-content');
    let currentHtmlForPrint = '';

    window.viewDoc = function (docId) {
      const doc = allContracts.find(c => c.id === docId);
      if (doc) {
        let htmlStr = doc.html_content || "Kho dữ liệu trống!";
        
        // Xóa con dấu (Picture2.png) khỏi tất cả văn bản trừ Báo giá (cái đầu tiên)
        // Tách theo page-break, giữ nguyên cái đầu, xóa Picture2 ở các cái sau
        const parts = htmlStr.split(/(<div[^>]*class=["']page-break["'][^>]*>)/i);
        // split with capture group returns: [text_before, match1, text_between, match2, ...]
        if (parts.length > 2) {
          // Because we captured the separator, parts[1] is the first '<div class="page-break">', parts[2] is its content.
          // Báo giá is in parts[2]. The subsequent documents are at parts[4], parts[6], etc.
          for (let i = 4; i < parts.length; i += 2) {
            parts[i] = parts[i].replace(/<img[^>]*Picture2\.png[^>]*>/gi, '');
          }
          htmlStr = parts.join('');
        }
        
        currentHtmlForPrint = htmlStr;
        modalContent.innerHTML = htmlStr;
        modal.style.display = 'flex';
      }
    };

    document.getElementById('btn-close-modal').addEventListener('click', () => {
      modal.style.display = 'none';
      modalContent.innerHTML = '';
      currentHtmlForPrint = '';
    });

    // ========== IN ẤN: COPY Y HỆT TỪ app.js DÒNG 832-848 ==========
    // Logic gốc:
    //   printZone.innerHTML = docs.map(html => `<div class="page-break">${html}</div>`).join('');
    //   setTimeout(() => { window.print(); printZone.innerHTML = ''; }, 500);
    //
    // HTML từ Firestore ĐÃ CÓ SẴN cấu trúc <div class="page-break">...</div>
    // nên chỉ cần bơm thẳng vào #print-zone rồi gọi window.print()
    document.getElementById('btn-print-modal').addEventListener('click', () => {
      if (!currentHtmlForPrint) return;

      const printZone = document.getElementById('print-zone');
      printZone.innerHTML = currentHtmlForPrint;

      setTimeout(() => {
        window.print();
        printZone.innerHTML = '';
      }, 500);
    });
  </script>
</body>
</html>
