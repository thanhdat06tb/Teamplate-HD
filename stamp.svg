<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <style>
    .circular-text {
      font-family: Arial, sans-serif;
      font-weight: bold;
      fill: #b30000;
      font-size: 21px; 
    }
    .star {
      font-family: Arial, sans-serif;
      font-weight: bold;
      fill: #b30000;
      font-size: 24px;
      text-anchor: middle;
      alignment-baseline: middle;
    }
    .center-text-arial {
      font-family: Arial, sans-serif;
      font-weight: bold;
      fill: #b30000;
      text-anchor: middle;
      font-size: 16px;
    }
    .center-text-times {
      font-family: 'Times New Roman', serif;
      font-weight: 900;
      fill: #b30000;
      text-anchor: middle;
    }
  </style>

  <!-- Outer ring -->
  <circle cx="150" cy="150" r="142" stroke="#b30000" stroke-width="5" fill="none" />
  <!-- Inner ring -->
  <circle cx="150" cy="150" r="98" stroke="#b30000" stroke-width="1.5" fill="none" />
  
  <path id="topPath" d="M 39 150 A 111 111 0 0 1 261 150" fill="none" stroke="none" />
  <path id="bottomPath" d="M 21 150 A 129 129 0 0 0 279 150" fill="none" stroke="none" />
  
  <text class="circular-text" letter-spacing="-0.5">
    <textPath href="#topPath" startOffset="50%" text-anchor="middle">
      M.S.D.N:3703486766-C.T.T.N.H.H
    </textPath>
  </text>
  <text class="circular-text" letter-spacing="2.5">
    <textPath href="#bottomPath" startOffset="50%" text-anchor="middle">
      THÀNH PHỐ HỒ CHÍ MINH
    </textPath>
  </text>

  <!-- Stars placed exactly at r=120 -->
  <text x="30" y="157" class="star">★</text>
  <text x="270" y="157" class="star">★</text>

  <!-- Center contents -->
  <text x="150" y="80" class="center-text-arial">CÔNG TY</text>
  <text x="150" y="104" class="center-text-arial">TNHH</text>
  <text x="150" y="128" class="center-text-arial" font-stretch="condensed" letter-spacing="-0.5">QUỐC TẾ THƯƠNG MẠI</text>
  
  <text x="150" y="170" class="center-text-times" font-size="34" letter-spacing="1">HUA SEN</text>
  <text x="150" y="204" class="center-text-times" font-size="24">VIỆT NAM</text>

</svg>
